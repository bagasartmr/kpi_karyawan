<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input KPI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Input Penilaian KPI</h2>

        <form method="POST">

            <div class="mb-3">
                <label>Karyawan</label>

                <select name="id_karyawan" class="form-control">

                    {% for k in karyawan %}

                    <option value="{{ k[0] }}">
                        {{ k[1] }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">
                <label>Kualitas</label>
                <input type="number" name="kualitas" class="form-control">
            </div>

            <div class="mb-3">
                <label>Kuantitas</label>
                <input type="number" name="kuantitas" class="form-control">
            </div>

            <div class="mb-3">
                <label>Absensi</label>
                <input type="number" name="absensi" class="form-control">
            </div>

            <div class="mb-3">
                <label>Pulang Cepat</label>
                <input type="number" name="pulang_cepat" class="form-control">
            </div>

            <div class="mb-3">
                <label>Sanksi</label>
                <input type="number" name="sanksi" class="form-control">
            </div>

            <div class="mb-3">
                <label>Ketepatan Hadir</label>
                <input type="number" name="ketepatan_hadir" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">
                Simpan KPI
            </button>

        </form>

    </div>

</div>

</body>
</html>
