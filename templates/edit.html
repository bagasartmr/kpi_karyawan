<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Karyawan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Edit Data Karyawan</h2>

        <form method="POST">

            <div class="mb-3">
                <label>Nama</label>
                <input type="text"
                       name="nama"
                       class="form-control"
                       value="{{ data[1] }}">
            </div>

            <div class="mb-3">
                <label>Jabatan</label>
                <input type="text"
                       name="jabatan"
                       class="form-control"
                       value="{{ data[2] }}">
            </div>

            <div class="mb-3">
                <label>Divisi</label>
                <input type="text"
                       name="divisi"
                       class="form-control"
                       value="{{ data[3] }}">
            </div>

            <div class="mb-3">
                <label>Alamat</label>
                <textarea name="alamat"
                          class="form-control">{{ data[4] }}</textarea>
            </div>

            <div class="mb-3">
                <label>No HP</label>
                <input type="text"
                       name="no_hp"
                       class="form-control"
                       value="{{ data[5] }}">
            </div>

            <button type="submit" class="btn btn-success">
                Update
            </button>

            <a href="/" class="btn btn-secondary">
                Kembali
            </a>

        </form>

    </div>

</div>

</body>
</html>
